<!DOCTYPE html>
<html>
<head>
    <title>MIDI Analyzer</title>
    <style>
        body {
            font-family: Arial;
            max-width: 700px;
            margin: auto;
            padding: 20px;
        }

        h1 {
            text-align: center;
        }

        .box {
            border: 1px solid #ccc;
            padding: 15px;
            margin-top: 20px;
            border-radius: 8px;
        }

        .chord {
            padding: 5px 0;
            border-bottom: 1px solid #eee;
        }
    </style>
</head>
<body>

<h1>MIDI Analyzer</h1>

<p>Upload a MIDI file to analyze chord progression.</p>

<form method="POST" enctype="multipart/form-data">
    
    <input type="file" name="file" required>

    <br><br>

    <!-- キー選択 -->
    <label>Key:</label>
    <select name="key">
        <option value="C">C</option>
        <option value="D">D</option>
        <option value="E">E</option>
        <option value="F">F</option>
        <option value="G">G</option>
        <option value="A">A</option>
        <option value="B">B</option>
    </select>

    <br><br>

    <button type="submit">Analyze</button>
</form>

<hr>

<h2>Browser MIDI Player</h2>

<input type="file" id="midiFile">
<button onclick="loadMidi()">Load & Play</button>


{% if chords %}
<div class="box">
    <h2>Chord Progression</h2>

    <!-- 見やすいリスト表示 -->
    {% for chord in chords %}
        <div class="chord">{{ loop.index }}. {{ chord }}</div>
    {% endfor %}

    <br>

    <!-- 一行表示も残す -->
    <strong>Flow:</strong><br>
    {{ chords | join(' → ') }}

</div>
{% endif %}

<!-- ライブラリ読み込み -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/tone/14.8.49/Tone.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@tonejs/midi"></script>

<script>
async function loadMidi() {
    const file = document.getElementById("midiFile").files[0];

    if (!file) {
        alert("ファイルを選択してください");
        return;
    }

    const arrayBuffer = await file.arrayBuffer();
    const midi = new Midi(arrayBuffer);

    const synth = new Tone.PolySynth(Tone.Synth).toDestination();

    midi.tracks.forEach(track => {
        track.notes.forEach(note => {
            Tone.Transport.schedule(time => {
                synth.triggerAttackRelease(
                    note.name,
                    note.duration,
                    time,
                    note.velocity
                );
            }, note.time);
        });
    });

    await Tone.start();
    Tone.Transport.start();
}
</script>
</body>
</html>
